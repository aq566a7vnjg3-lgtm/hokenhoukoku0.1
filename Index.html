<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>営業入力・管理アプリ</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d9e0ea;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --ok: #16a34a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab-btn {
      border: 0;
      background: #dbeafe;
      color: #1e3a8a;
      padding: 14px 12px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
    }
    .tab-btn.active {
      background: var(--primary);
      color: #fff;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
      margin-bottom: 16px;
    }
    h1, h2, h3 { margin: 0 0 12px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      padding: 14px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
    button.primary, button.secondary {
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button.primary { background: var(--primary); color: #fff; }
    button.primary:hover { background: var(--primary-dark); }
    button.secondary { background: #e5e7eb; color: #111827; }
    .message { margin-top: 12px; font-size: 14px; }
    .message.ok { color: var(--ok); }
    .message.error { color: var(--danger); }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fafcff;
    }
    .stat .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .stat .value { font-size: 22px; font-weight: 800; }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }
    th, td {
      border-bottom: 1px solid #eef2f7;
      padding: 10px 8px;
      text-align: left;
      font-size: 14px;
      white-space: nowrap;
      vertical-align: middle;
    }
    th { background: #f8fafc; position: sticky; top: 0; }
    .hidden { display: none; }
    .row-inline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .muted { color: var(--muted); font-size: 13px; }
    @media (min-width: 900px) {
      .grid.form-grid { grid-template-columns: repeat(2, 1fr); }
      .stats { grid-template-columns: repeat(6, 1fr); }
      .filters-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="tabs">
      <button id="tabInput" class="tab-btn active" onclick="switchTab('input')">営業入力</button>
      <button id="tabAdmin" class="tab-btn" onclick="switchTab('admin')">管理者一覧</button>
    </div>

    <section id="viewInput">
      <div class="card">
        <h2>営業入力</h2>
        <div class="grid form-grid">
          <div class="field">
            <label for="baseNo">拠点番号</label>
            <select id="baseNo"></select>
          </div>
          <div class="field">
            <label for="staffName">担当名</label>
            <input id="staffName" type="text" placeholder="担当名を入力" />
          </div>
          <div class="field">
            <label for="proposalCount">提案件数</label>
            <input id="proposalCount" type="number" min="0" inputmode="numeric" />
          </div>
          <div class="field">
            <label for="policyCollection">証券回収</label>
            <input id="policyCollection" type="number" min="0" inputmode="numeric" />
          </div>
          <div class="field">
            <label for="acquisitionCount">獲得件数</label>
            <input id="acquisitionCount" type="number" min="0" inputmode="numeric" />
          </div>
          <div class="field">
            <label for="category">区分</label>
            <select id="category"></select>
          </div>
        </div>
        <div class="actions">
          <button class="primary" onclick="submitEntry()">登録する</button>
          <button class="secondary" onclick="resetForm()">クリア</button>
        </div>
        <div id="formMessage" class="message"></div>
      </div>
    </section>

    <section id="viewAdmin" class="hidden">
      <div class="card">
        <h2>絞り込み</h2>
        <div class="grid filters-grid">
          <div class="field">
            <label for="dateFrom">日付（開始）</label>
            <input id="dateFrom" type="date" />
          </div>
          <div class="field">
            <label for="dateTo">日付（終了）</label>
            <input id="dateTo" type="date" />
          </div>
          <div class="field">
            <label for="filterBaseNo">拠点番号</label>
            <select id="filterBaseNo"></select>
          </div>
          <div class="field">
            <label for="filterStaffName">担当名検索</label>
            <input id="filterStaffName" type="text" placeholder="担当名を検索" />
          </div>
        </div>
        <div class="actions">
          <button class="primary" onclick="loadEntries()">検索</button>
          <button class="secondary" onclick="clearFilters()">絞り込み解除</button>
        </div>
      </div>

      <div class="card">
        <h2>合計表示・件数集計</h2>
        <div class="stats">
          <div class="stat"><div class="label">登録件数</div><div id="sCount" class="value">0</div></div>
          <div class="stat"><div class="label">提案件数 合計</div><div id="sProposal" class="value">0</div></div>
          <div class="stat"><div class="label">証券回収 合計</div><div id="sPolicy" class="value">0</div></div>
          <div class="stat"><div class="label">獲得件数 合計</div><div id="sAcquisition" class="value">0</div></div>
          <div class="stat"><div class="label">新規 合計</div><div id="sNew" class="value">0</div></div>
          <div class="stat"><div class="label">保有期 合計</div><div id="sRetention" class="value">0</div></div>
        </div>
        <div class="muted">重複登録は許可しています。管理者が一覧上の「重複判定」で確認してください。</div>
      </div>

      <div class="card">
        <h2>一覧</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>登録日</th>
                <th>登録日時</th>
                <th>拠点番号</th>
                <th>担当名</th>
                <th>提案件数</th>
                <th>証券回収</th>
                <th>獲得件数</th>
                <th>区分</th>
                <th>重複判定</th>
              </tr>
            </thead>
            <tbody id="entriesBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script>
    let master = { baseOptions: [], categoryOptions: [], duplicateOptions: [] };

    function switchTab(tab) {
      document.getElementById('viewInput').classList.toggle('hidden', tab !== 'input');
      document.getElementById('viewAdmin').classList.toggle('hidden', tab !== 'admin');
      document.getElementById('tabInput').classList.toggle('active', tab === 'input');
      document.getElementById('tabAdmin').classList.toggle('active', tab === 'admin');
      if (tab === 'admin') loadEntries();
    }

    function init() {
      google.script.run.withSuccessHandler(function(data) {
        master = data;
        fillSelect('baseNo', data.baseOptions, false);
        fillSelect('category', data.categoryOptions, false);
        fillSelect('filterBaseNo', data.baseOptions, true);
      }).getMasterData();
    }

    function fillSelect(id, values, includeBlank) {
      const el = document.getElementById(id);
      el.innerHTML = '';
      if (includeBlank) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'すべて';
        el.appendChild(opt);
      }
      values.forEach(function(value) {
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = value;
        el.appendChild(opt);
      });
    }

    function showFormMessage(text, isError) {
      const el = document.getElementById('formMessage');
      el.textContent = text || '';
      el.className = 'message ' + (isError ? 'error' : 'ok');
    }

    function resetForm() {
      document.getElementById('baseNo').selectedIndex = 0;
      document.getElementById('staffName').value = '';
      document.getElementById('proposalCount').value = '';
      document.getElementById('policyCollection').value = '';
      document.getElementById('acquisitionCount').value = '';
      document.getElementById('category').selectedIndex = 0;
      showFormMessage('');
    }

    function submitEntry() {
      const payload = {
        baseNo: document.getElementById('baseNo').value,
        staffName: document.getElementById('staffName').value.trim(),
        proposalCount: document.getElementById('proposalCount').value,
        policyCollection: document.getElementById('policyCollection').value,
        acquisitionCount: document.getElementById('acquisitionCount').value,
        category: document.getElementById('category').value
      };

      google.script.run
        .withSuccessHandler(function(res) {
          showFormMessage(res.message || '登録しました。', false);
          resetForm();
        })
        .withFailureHandler(function(err) {
          showFormMessage(err.message || '登録に失敗しました。', true);
        })
        .saveEntry(payload);
    }

    function currentFilters() {
      return {
        dateFrom: document.getElementById('dateFrom').value,
        dateTo: document.getElementById('dateTo').value,
        baseNo: document.getElementById('filterBaseNo').value,
        staffName: document.getElementById('filterStaffName').value.trim()
      };
    }

    function clearFilters() {
      document.getElementById('dateFrom').value = '';
      document.getElementById('dateTo').value = '';
      document.getElementById('filterBaseNo').value = '';
      document.getElementById('filterStaffName').value = '';
      loadEntries();
    }

    function loadEntries() {
      google.script.run.withSuccessHandler(renderEntries).getEntries(currentFilters());
    }

    function renderEntries(data) {
      const body = document.getElementById('entriesBody');
      body.innerHTML = '';

      document.getElementById('sCount').textContent = data.totals.count;
      document.getElementById('sProposal').textContent = data.totals.proposalCount;
      document.getElementById('sPolicy').textContent = data.totals.policyCollection;
      document.getElementById('sAcquisition').textContent = data.totals.acquisitionCount;
      document.getElementById('sNew').textContent = data.totals.newCount;
      document.getElementById('sRetention').textContent = data.totals.retentionCount;

      if (!data.rows.length) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="9">データがありません。</td>';
        body.appendChild(tr);
        return;
      }

      data.rows.forEach(function(item) {
        const tr = document.createElement('tr');
        const select = buildDuplicateSelect(item);
        tr.innerHTML = '' +
          '<td>' + escapeHtml(item.entryDate) + '</td>' +
          '<td>' + escapeHtml(item.createdAt) + '</td>' +
          '<td>' + escapeHtml(item.baseNo) + '</td>' +
          '<td>' + escapeHtml(item.staffName) + '</td>' +
          '<td>' + item.proposalCount + '</td>' +
          '<td>' + item.policyCollection + '</td>' +
          '<td>' + item.acquisitionCount + '</td>' +
          '<td>' + escapeHtml(item.category) + '</td>' +
          '<td></td>';
        tr.children[8].appendChild(select);
        body.appendChild(tr);
      });
    }

    function buildDuplicateSelect(item) {
      const select = document.createElement('select');
      master.duplicateOptions.forEach(function(status) {
        const opt = document.createElement('option');
        opt.value = status;
        opt.textContent = status;
        if (status === item.duplicateStatus) opt.selected = true;
        select.appendChild(opt);
      });
      select.onchange = function() {
        google.script.run.withFailureHandler(function(err) {
          alert(err.message || '更新に失敗しました。');
          loadEntries();
        }).updateDuplicateStatus(item.id, select.value);
      };
      return select;
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
